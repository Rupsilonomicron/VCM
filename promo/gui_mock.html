<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VCM - VoiceChatMover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>VCM</h1>
    <span class="cb-label">サーバー</span>
    <select id="guild-select" class="guild-select"></select>
    <span id="status" class="status off">未接続</span>
    <button id="token-btn" class="btn ghost sm" title="Bot トークンの設定・変更">⚙ トークン設定</button>
  </header>

  <div id="controlbar">
    <span class="cb-label">メインVC</span>
    <select id="main-select"></select>
    <button id="gather-toggle" class="btn">⬇ 集合</button>
    <button id="recruit-toggle" class="btn">✋ 参加希望を募る</button>
    <span class="cb-sep"></span>
    <span class="cb-label">プリセット</span>
    <button id="save-preset" class="btn ghost sm">現在の編成を保存</button>
    <div id="presets" class="presets"></div>
  </div>

  <div id="ttsbar">
    <span class="cb-label">読み上げ</span>
    <span id="tts-engine" class="status off">VOICEVOX 確認中…</span>
    <span id="tts-controls" class="tts-controls hidden">
      <button id="tts-skip" class="btn ghost sm">⏭ スキップ</button>
      <button id="tts-clear" class="btn ghost sm">キュー消去</button>
      <button id="tts-test" class="btn ghost sm">テスト</button>
      <span class="cb-sep"></span>
      <button id="tts-dict" class="btn ghost sm">📖 辞書</button>
      <span id="tts-now" class="tts-now"></span>
    </span>
    <span id="tts-guide" class="tts-guide hidden">
      VOICEVOX をインストールすると読み上げ機能が使えます:
      <a href="https://voicevox.hiroshiba.jp/" target="_blank" rel="noopener">公式サイト</a>
      <button id="tts-redetect" class="btn ghost sm">再検出</button>
    </span>
  </div>

  <main>
    <section id="channels-panel" class="panel">
      <h2>ボイスチャンネル</h2>
      <div id="channels" class="board"></div>
    </section>

    <section id="teams-panel" class="panel">
      <h2>チーム</h2>
      <div id="teams" class="board"></div>
      <div class="team-actions">
        <button id="add-team" class="btn block">+ チーム追加</button>
        <button id="shuffle-teams" class="btn" title="チーム所属メンバー全員をランダムに均等へ振り分け直す">🔀 シャッフル</button>
      </div>
    </section>
  </main>

  <div id="dict-modal" class="modal hidden">
    <div class="modal-box">
      <h2>読み上げ辞書</h2>
      <div class="dict-add">
        <input id="dict-word" placeholder="単語" />
        <span class="dict-arrow">→</span>
        <input id="dict-reading" placeholder="読み" />
        <button id="dict-add-btn" class="btn sm">追加</button>
      </div>
      <div id="dict-list" class="dict-list"></div>
      <div class="modal-actions">
        <span class="spacer"></span>
        <button id="dict-close" class="btn ghost">閉じる</button>
      </div>
    </div>
  </div>

  <div id="token-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Bot トークン設定</h2>
      <p id="token-current" class="token-current"></p>
      <div class="token-row">
        <input id="token-input" type="password" />
        <button id="token-eye" class="btn ghost sm" type="button">👁</button>
      </div>
      <p id="token-msg" class="token-msg"></p>
      <div class="modal-actions">
        <button id="token-delete" class="btn ghost sm danger hidden">保存済みトークンを削除</button>
        <span class="spacer"></span>
        <button id="token-cancel" class="btn ghost">閉じる</button>
        <button id="token-save" class="btn">保存して接続</button>
      </div>
    </div>
  </div>

  <script>
    // WebSocket と fetch をスタブ化（サーバーなしで描画するため）
    window.WebSocket = class {
      constructor() { setTimeout(() => this.onopen && this.onopen(), 0); }
    };
    window.fetch = () => Promise.resolve({ ok: true, json: () => Promise.resolve({}) });
  </script>
  <script src="app.js"></script>
  <script>
    // --- モックデータ描画 ---
    const PALETTE = ["#5865F2","#57F287","#FEE75C","#EB459E","#ED4245","#3BA55D","#FAA61A","#00B0F4","#9B59B6","#E67E22","#1ABC9C","#F47FFF"];
    function avatar(i, initial) {
      const c = PALETTE[i % PALETTE.length];
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="${c}"/><text x="32" y="42" font-size="30" font-family="Segoe UI, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">${initial}</text></svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }
    let uid = 0;
    function member(name, vc) {
      uid++;
      return { id: String(uid), name, avatar: avatar(uid, name[0].toUpperCase()), voice_channel_id: vc };
    }

    const lobby = [member("そら", "10"), member("Kaito", "10"), member("ユウキ", "10"), member("あおい", "10"), member("Rin", "10"), member("たくみ", "10")];
    const t1vc = [member("ミナト", "11"), member("Haru", "11"), member("ひなた", "11"), member("Ren", "11")];
    const t2vc = [member("さくら", "12"), member("Leo", "12"), member("メイ", "12"), member("だいち", "12")];

    lastSnapshot = {
      ready: true,
      bot_state: "ready",
      bot_user: "VCM#0001",
      guilds: [{ id: "1", name: "ゲーム部" }],
      guild_id: "1",
      main_channel_id: "10",
      can_scatter: false,
      recruiting: false,
      preset_names: ["本戦", "スクリム"],
      channels: [
        { id: "10", name: "集合ロビー", category: "🎮 大会", category_id: "c1", members: lobby },
        { id: "11", name: "チーム1", category: "🎮 大会", category_id: "c1", members: t1vc.concat(t2vc.slice(0, 2)) },
      ],
      teams: [
        { id: 1, name: "チームA", members: [t1vc[0], t1vc[1], lobby[0], lobby[1]] },
        { id: 2, name: "チームB", members: [t2vc[0], t2vc[1], lobby[2], lobby[3]] },
      ],
      tts: {
        engine: "ready",
        channel_id: "10",
        reading: "つぎ、こうたいでおねがいします！",
        queue: ["りょうかい！", "ないすー"],
        dict: {},
      },
    };
    wsConnected = true;
    render();
  </script>
</body>
</html>
